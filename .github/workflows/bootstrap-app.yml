name: Bootstrap App
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.0.2). Must be > previous bootstrap."
        required: true
        default: "0.0.2"
      app_id:
        description: "App ID — set this on retry to skip /app/create. Leave blank for first submission."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: microlazy-apps/lazycat-ci/.github/workflows/lpk-build.yml@v0.1.0
    with:
      version:        ${{ inputs.version }}
      docker-context: ./vendor/memfree
      patches-target: vendor/memfree
    secrets: inherit

  bootstrap:
    needs: build
    uses: microlazy-apps/lazycat-ci/.github/workflows/bootstrap.yml@v0.1.0
    with:
      version: ${{ inputs.version }}
      app_id:  ${{ inputs.app_id }}
    secrets: inherit
