package: cloud.lazycat.app.memfree
version: ${VERSION}
name: MemFree
description: 自托管 Hybrid AI 搜索引擎 — 知识库 + 联网检索 + AI 摘要
author: MemFree
license: MIT
homepage: https://github.com/microlazy-apps/lazy-memfree
locales:
  zh-CN:
    name: MemFree
    description: 自托管 Hybrid AI 搜索 — 把笔记、书签、文档和实时网页搜索合并成一个 AI 助手
    usage: |
      ## 关于 MemFree

      MemFree 是一个 Hybrid AI 搜索引擎，把个人知识库与全网搜索合在
      一起，由大模型给出引用清晰的回答：

      - 私有知识库：上传 PDF / Word / Markdown / 文本，向量化检索
      - 联网搜索：通过 Google（Serper）/ Exa 实时检索网页
      - 多模型：OpenAI / Claude / Gemini / DeepSeek / Qwen / OpenRouter
      - 多输入：文本、图片、文件、网页

      ## 配置

      安装时需要一次性填写：
      - **OpenAI API Key**（必填）— 用于嵌入向量与默认对话模型；
        可填官方 key 或任意 OpenAI 兼容服务的 key
      - **OpenAI Base URL**（可选）— 改用 Azure / DeepSeek / 阿里云
        百炼等兼容端点
      - **Serper API Key**（推荐）— https://serper.dev 注册即送，
        用于 Google 网络搜索
      - **Anthropic / DeepSeek / Qwen / Gemini / OpenRouter Key**（可选）
      - **GitHub / Google OAuth**（可选）— 不填则禁用对应登录方式

      ## 使用

      安装完成后访问 https://memfree.{你的微服域名}：
      1. 打开页面即可直接进行 AI 搜索
      2. 配置了 OAuth 后可以登录，登录用户支持搜索历史、上传文件、
         构建私人知识库
      3. 上传文档：dashboard 内点上传，会被向量化进本地 LanceDB
      4. 提问：选择模型 / 切换搜索引擎 / 选择输出格式（文本 / 思维
         导图 / 图片）

      ## 数据持久化

      - /lzcapp/var/data/lancedb — 本地向量库（用户上传的文档）
      - /lzcapp/var/redis — Redis 数据（用户、会话、搜索历史）
      - /lzcapp/var/logs — 应用日志

      ## 上游

      - 上游项目：https://github.com/memfreeme/memfree
      - 本仓库（懒猫包装）：https://github.com/microlazy-apps/lazy-memfree
  en:
    name: MemFree
    description: Self-hosted Hybrid AI Search — knowledge base + web search + AI summary
    usage: |
      ## About MemFree

      MemFree is a Hybrid AI Search Engine combining your private
      knowledge base with the public web, with cited LLM answers:

      - Private KB: upload PDF / Word / Markdown / text, vector search
      - Web search: live Google / Exa results via Serper
      - Multi-model: OpenAI, Claude, Gemini, DeepSeek, Qwen, OpenRouter
      - Multi-input: text, images, files, web pages

      ## Configuration

      One-time inputs at install:
      - **OpenAI API Key** (required) — used for embeddings + default
        chat model. Any OpenAI-compatible key works.
      - **OpenAI Base URL** (optional) — point at Azure / DeepSeek /
        Aliyun Bailian if you use a compatible endpoint.
      - **Serper API Key** (recommended) — https://serper.dev free key
        for Google search.
      - Anthropic / DeepSeek / Qwen / Gemini / OpenRouter keys (optional)
      - GitHub / Google OAuth (optional) — leave blank to disable

      ## Usage

      Open https://memfree.{your-box-domain} after install:
      1. Search immediately without login
      2. Configure OAuth to enable login → search history, file upload,
         personal knowledge base
      3. Upload docs in the dashboard → vectorized into local LanceDB
      4. Pick model / search engine / output format (text / mind map /
         image) on the search page

      ## Persistent storage

      - /lzcapp/var/data/lancedb — local vector store (uploaded docs)
      - /lzcapp/var/redis — Redis data (users, sessions, search history)
      - /lzcapp/var/logs — application logs

      ## Upstream

      - Upstream: https://github.com/memfreeme/memfree
      - This wrapper repo: https://github.com/microlazy-apps/lazy-memfree
